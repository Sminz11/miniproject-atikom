<div class="max-w-2xl mx-auto">
  <h2 class="text-3xl font-bold text-gray-800 mb-6">Upload File</h2>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <label
      class="flex flex-col items-center justify-center border-2 border-dashed border-blue-300 rounded-xl p-10 cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-blue-400 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l-3.75 3.75M12 9.75l3.75 3.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-gray-600 font-medium mb-1">เลือกไฟล์ .txt ที่ต้องการอัปโหลด</p>
      <p class="text-gray-400 text-sm mb-4">คลิกเพื่อเลือกไฟล์</p>
      <input type="file" accept=".txt" (change)="onFileSelect($event)" class="hidden">
      <span class="bg-blue-600 text-white text-sm font-medium px-5 py-2 rounded-lg">เลือกไฟล์</span>
    </label>

    <div *ngIf="selectedFile()" class="mt-4 flex items-center gap-2 text-green-700 bg-green-50 px-4 py-3 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-sm font-medium">{{ selectedFile()!.name }}</span>
    </div>

    <div *ngIf="error()" class="mt-4 flex items-center gap-2 text-red-700 bg-red-50 px-4 py-3 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
      <span class="text-sm font-medium">{{ error() }}</span>
    </div>

    <button (click)="onUpload()" [disabled]="!selectedFile() || loading()"
      class="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
      <svg *ngIf="loading()" class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      {{ loading() ? 'กำลังอัปโหลด...' : 'อัปโหลด' }}
    </button>
  </div>

  <div *ngIf="result()" class="mt-6 bg-green-50 border border-green-200 rounded-2xl p-6">
    <div class="flex items-center gap-2 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-green-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <h3 class="text-lg font-bold text-green-800">อัปโหลดสำเร็จ!</h3>
    </div>
    <div class="grid grid-cols-2 gap-3 text-sm">
      <div class="bg-white rounded-lg p-3">
        <p class="text-gray-500 text-xs mb-1">Upload ID</p>
        <p class="font-semibold text-gray-800">{{ result().uploadId }}</p>
      </div>
      <div class="bg-white rounded-lg p-3">
        <p class="text-gray-500 text-xs mb-1">ชื่อไฟล์</p>
        <p class="font-semibold text-gray-800">{{ result().fileName }}</p>
      </div>
      <div class="bg-white rounded-lg p-3">
        <p class="text-gray-500 text-xs mb-1">จำนวนรายการ</p>
        <p class="font-semibold text-gray-800">{{ result().totalRecord }}</p>
      </div>
      <div class="bg-white rounded-lg p-3">
        <p class="text-gray-500 text-xs mb-1">สถานะ</p>
        <p class="font-semibold text-blue-600">{{ result().status }}</p>
      </div>
    </div>
    <button (click)="goToHistory()"
      class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-lg transition-colors">
      ดูประวัติ Upload →
    </button>
  </div>
</div>
